<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    /* Chart.js requires an explicit container height */
    .chart-wrap { position: relative; height: 220px; }
    /* Bootstrap has no tabular-nums utility */
    .amount { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
  <div class="d-flex align-items-center gap-3">
    <span class="navbar-brand fw-bold mb-0 h1">Faresight</span>
    <span class="text-white-50 small">local expense tracker</span>
  </div>
  <button id="syncNowBtn" class="btn btn-primary btn-sm" onclick="syncNow()">Sync now</button>
</nav>

<div id="lockBanner" class="alert alert-danger d-none d-flex align-items-center gap-3 mb-0 rounded-0 border-0 border-bottom border-danger px-4 py-2" role="alert">
  <span id="lockMsg" class="me-auto small fw-medium"></span>
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" onclick="proceedAnyway()">Proceed anyway</button>
    <button class="btn btn-secondary btn-sm" onclick="goOffline()">Work offline</button>
  </div>
</div>

<div id="nasBanner" class="alert d-none d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium" role="alert"></div>

<main class="container-lg my-4 px-3">

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Spending by Category</h2>
          <div class="chart-wrap"><canvas id="catChart"></canvas></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Monthly Spending</h2>
          <div class="chart-wrap"><canvas id="monthChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add transaction -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Add Transaction</h2>
      <form id="addForm">
        <div class="row g-2">
          <div class="col-sm-6 col-md-4 col-lg-2">
            <input type="date" name="date" class="form-control" required />
          </div>
          <div class="col-sm-6 col-md-4 col-lg-3">
            <input type="text" name="description" class="form-control" placeholder="Description" required />
          </div>
          <div class="col-sm-6 col-md-4 col-lg-2">
            <input type="number" name="amount" class="form-control" placeholder="Amount (negative = expense)" step="0.01" required />
          </div>
          <div class="col-sm-6 col-md-4 col-lg-2">
            <input type="text" name="category" class="form-control" placeholder="Category" required list="catList" />
            <datalist id="catList"></datalist>
          </div>
          <div class="col-sm-6 col-md-4 col-lg-2">
            <input type="text" name="source" class="form-control" placeholder="Source (e.g. credit card)" />
          </div>
          <div class="col-12">
            <textarea name="note" class="form-control" placeholder="Note (optional)" rows="2"></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Add</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Transaction table -->
  <div class="card shadow-sm">
    <div class="card-header d-flex align-items-center justify-content-between py-3">
      <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Transactions</h2>
      <select id="catFilter" class="form-select form-select-sm w-auto">
        <option value="">All categories</option>
      </select>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="text-uppercase text-muted small fw-semibold">Date</th>
            <th class="text-uppercase text-muted small fw-semibold">Description</th>
            <th class="text-uppercase text-muted small fw-semibold">Category</th>
            <th class="text-uppercase text-muted small fw-semibold">Source</th>
            <th class="text-uppercase text-muted small fw-semibold amount text-end">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="txBody">
          <tr><td colspan="6" class="text-center text-muted py-5">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── API helpers ───────────────────────────────────────────────────────────────
const api = async (path, opts = {}) => {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
};

// ── State ─────────────────────────────────────────────────────────────────────
let catChart, monthChart;
let categoryFilter = '';

// Base classes always present on the NAS status banner when visible.
const NAS_BASE = 'alert d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium';

// ── Charts ────────────────────────────────────────────────────────────────────
async function refreshCharts() {
  const [byCat, byMonth] = await Promise.all([
    api('/api/summary/by-category'),
    api('/api/summary/by-month'),
  ]);

  // Category pie
  const palette = ['#0071e3','#30d158','#ff9f0a','#ff375f','#bf5af2','#5e5ce6','#64d2ff','#ff6961'];
  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: byCat.map(r => r.category),
      datasets: [{ data: byCat.map(r => Math.abs(r.total)), backgroundColor: palette }],
    },
    options: { plugins: { legend: { position: 'right' } }, maintainAspectRatio: false },
  });

  // Monthly bar
  const labels = byMonth.map(r => `${r.year}-${String(r.month).padStart(2,'0')}`);
  if (monthChart) monthChart.destroy();
  monthChart = new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Total', data: byMonth.map(r => Math.abs(r.total)), backgroundColor: '#0071e3' }],
    },
    options: { plugins: { legend: { display: false } }, maintainAspectRatio: false },
  });
}

// ── Category filter / datalist ────────────────────────────────────────────────
async function refreshCategories() {
  const cats = await api('/api/categories');
  const filter = document.getElementById('catFilter');
  const datalist = document.getElementById('catList');

  const prev = filter.value;
  filter.innerHTML = '<option value="">All categories</option>';
  datalist.innerHTML = '';
  cats.forEach(c => {
    filter.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`);
    datalist.insertAdjacentHTML('beforeend', `<option value="${c}">`);
  });
  filter.value = prev;
}

// ── Transaction list ──────────────────────────────────────────────────────────
async function refreshTable() {
  const url = categoryFilter ? `/api/transactions?category=${encodeURIComponent(categoryFilter)}` : '/api/transactions';
  const txs = await api(url);
  const tbody = document.getElementById('txBody');

  if (!txs.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-5">No transactions yet.</td></tr>';
    return;
  }

  tbody.innerHTML = txs.map(t => {
    const neg = t.amount < 0;
    const amtStr = (neg ? '-' : '+') + '$' + Math.abs(t.amount).toFixed(2);
    return `<tr>
      <td>${t.date}</td>
      <td>${esc(t.description)}${t.note ? `<br><small class="text-muted">${esc(t.note)}</small>` : ''}</td>
      <td><span class="badge bg-secondary text-dark">${esc(t.category)}</span></td>
      <td>${t.source ? esc(t.source) : '—'}</td>
      <td class="amount text-end ${neg ? 'text-danger' : 'text-success'}">${amtStr}</td>
      <td class="d-flex gap-1">
        <button class="btn btn-danger btn-sm" onclick="deleteTx(${t.id})">Del</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  await api(`/api/transactions/${id}`, { method: 'DELETE' });
  await refreshAll();
}

// ── Add form ──────────────────────────────────────────────────────────────────
document.getElementById('addForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {
    date: fd.get('date'),
    description: fd.get('description'),
    amount: parseFloat(fd.get('amount')),
    category: fd.get('category'),
    source: fd.get('source') || null,
    note: fd.get('note') || null,
  };
  await api('/api/transactions', { method: 'POST', body: JSON.stringify(body) });
  e.target.reset();
  await refreshAll();
});

// ── Category filter ───────────────────────────────────────────────────────────
document.getElementById('catFilter').addEventListener('change', async e => {
  categoryFilter = e.target.value;
  await refreshTable();
});

// ── NAS status banners ────────────────────────────────────────────────────────
async function refreshNasBanner() {
  try {
    const s = await api('/api/sync/status');
    const nasBanner  = document.getElementById('nasBanner');
    const lockBanner = document.getElementById('lockBanner');

    if (s.lock_warning) {
      document.getElementById('lockMsg').textContent =
        `Database may be in use on "${s.lock_warning}". Proceeding will sync your local copy and may overwrite their recent changes.`;
      lockBanner.classList.remove('d-none');
      nasBanner.classList.add('d-none');
      return;
    }
    lockBanner.classList.add('d-none');

    if (s.reachable === false) {
      nasBanner.className = NAS_BASE + ' alert-warning';
      nasBanner.textContent = 'NAS share unreachable — running on local copy. Changes will not be synced.';
    } else if (s.last_action === 'pulled_update') {
      nasBanner.className = NAS_BASE + ' alert-success';
      nasBanner.textContent = `NAS sync: pulled latest data from NAS (updated ${s.detail}).`;
    } else if (s.last_action === 'pushed_update' && s.last_push) {
      nasBanner.className = NAS_BASE + ' alert-success';
      nasBanner.textContent = `NAS sync: pushed to NAS at ${s.last_push}.`;
    } else {
      nasBanner.className = NAS_BASE + ' d-none';
    }
  } catch (_) {
    // status endpoint unavailable — silently skip banners
  }
}

// ── Sync actions ──────────────────────────────────────────────────────────────
async function syncNow() {
  const btn = document.getElementById('syncNowBtn');
  btn.disabled = true;
  btn.textContent = 'Syncing…';
  try {
    await api('/api/sync', { method: 'POST' });
    await refreshNasBanner();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sync now';
  }
}

async function proceedAnyway() {
  await api('/api/sync', { method: 'POST' });
  await refreshNasBanner();
}

async function goOffline() {
  await api('/api/sync/go-offline', { method: 'POST' });
  document.getElementById('lockBanner').classList.add('d-none');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function refreshAll() {
  await Promise.all([refreshCharts(), refreshCategories(), refreshTable()]);
}

document.querySelector('input[name=date]').valueAsDate = new Date();

refreshNasBanner();
refreshAll();
</script>
</body>
</html>
