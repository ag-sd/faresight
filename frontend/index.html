<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    header span { opacity: 0.5; font-size: 0.9rem; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    /* ── Charts row ── */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .06em; color: #6e6e73; margin-bottom: 1rem; }
    .chart-wrap { position: relative; height: 220px; }

    /* ── Form ── */
    .form-card { background: #fff; border-radius: 14px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 2rem; }
    .form-card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .06em; color: #6e6e73; margin-bottom: 1rem; }
    form { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }
    form input, form select, form textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      background: #fafafa;
    }
    form textarea { resize: vertical; min-height: 38px; grid-column: 1 / -1; }
    .btn {
      padding: .55rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-danger  { background: #ff3b30; color: #fff; padding: .3rem .7rem; font-size: .8rem; }
    .btn-sm      { padding: .3rem .7rem; font-size: .8rem; }

    /* ── Table ── */
    .table-card { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; }
    .table-header h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .06em; color: #6e6e73; }
    .filter-row { display: flex; gap: .5rem; }
    .filter-row select { padding: .4rem .7rem; border: 1px solid #d1d1d6; border-radius: 8px; font-size: .85rem; }

    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      background: #f5f5f7;
      padding: .65rem 1rem;
      text-align: left;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6e6e73;
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid #f0f0f5; }
    tbody tr:hover { background: #fafafe; }
    tbody td { padding: .65rem 1rem; vertical-align: middle; }
    .amount { font-variant-numeric: tabular-nums; text-align: right; }
    .amount.neg { color: #ff3b30; }
    .amount.pos { color: #30d158; }
    .badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 20px;
      font-size: .75rem;
      background: #e8e8ed;
      color: #444;
    }
    .actions { display: flex; gap: .4rem; }
    .empty { text-align: center; padding: 3rem; color: #aaa; }

    /* ── NAS banner ── */
    #nasBanner {
      display: none;
      padding: .65rem 2rem;
      font-size: .85rem;
      font-weight: 500;
    }
    #nasBanner.offline  { background: #fff3cd; color: #7d4e00; border-bottom: 1px solid #f5d97e; }
    #nasBanner.synced   { background: #d1f4e0; color: #1a5c33; border-bottom: 1px solid #9fe5bc; }
  </style>
</head>
<body>

<header>
  <h1>Faresight</h1>
  <span>local expense tracker</span>
</header>
<div id="nasBanner"></div>

<main>

  <!-- Charts -->
  <div class="charts">
    <div class="card">
      <h2>Spending by Category</h2>
      <div class="chart-wrap"><canvas id="catChart"></canvas></div>
    </div>
    <div class="card">
      <h2>Monthly Spending</h2>
      <div class="chart-wrap"><canvas id="monthChart"></canvas></div>
    </div>
  </div>

  <!-- Add transaction -->
  <div class="form-card">
    <h2>Add Transaction</h2>
    <form id="addForm">
      <input type="date" name="date" required />
      <input type="text" name="description" placeholder="Description" required />
      <input type="number" name="amount" placeholder="Amount (negative = expense)" step="0.01" required />
      <input type="text" name="category" placeholder="Category" required list="catList" />
      <datalist id="catList"></datalist>
      <input type="text" name="source" placeholder="Source (e.g. credit card)" />
      <textarea name="note" placeholder="Note (optional)"></textarea>
      <button type="submit" class="btn btn-primary">Add</button>
    </form>
  </div>

  <!-- Transaction table -->
  <div class="table-card">
    <div class="table-header">
      <h2>Transactions</h2>
      <div class="filter-row">
        <select id="catFilter"><option value="">All categories</option></select>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Source</th>
          <th class="amount">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="txBody">
        <tr><td colspan="6" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script>
// ── API helpers ───────────────────────────────────────────────────────────────
const api = async (path, opts = {}) => {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
};

// ── State ─────────────────────────────────────────────────────────────────────
let catChart, monthChart;
let categoryFilter = '';

// ── Charts ────────────────────────────────────────────────────────────────────
async function refreshCharts() {
  const [byCat, byMonth] = await Promise.all([
    api('/api/summary/by-category'),
    api('/api/summary/by-month'),
  ]);

  // Category pie
  const palette = ['#0071e3','#30d158','#ff9f0a','#ff375f','#bf5af2','#5e5ce6','#64d2ff','#ff6961'];
  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: byCat.map(r => r.category),
      datasets: [{ data: byCat.map(r => Math.abs(r.total)), backgroundColor: palette }],
    },
    options: { plugins: { legend: { position: 'right' } }, maintainAspectRatio: false },
  });

  // Monthly bar
  const labels = byMonth.map(r => `${r.year}-${String(r.month).padStart(2,'0')}`);
  if (monthChart) monthChart.destroy();
  monthChart = new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Total', data: byMonth.map(r => Math.abs(r.total)), backgroundColor: '#0071e3' }],
    },
    options: { plugins: { legend: { display: false } }, maintainAspectRatio: false },
  });
}

// ── Category filter / datalist ────────────────────────────────────────────────
async function refreshCategories() {
  const cats = await api('/api/categories');
  const filter = document.getElementById('catFilter');
  const datalist = document.getElementById('catList');

  // Keep current selection
  const prev = filter.value;
  filter.innerHTML = '<option value="">All categories</option>';
  datalist.innerHTML = '';
  cats.forEach(c => {
    filter.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`);
    datalist.insertAdjacentHTML('beforeend', `<option value="${c}">`);
  });
  filter.value = prev;
}

// ── Transaction list ──────────────────────────────────────────────────────────
async function refreshTable() {
  const url = categoryFilter ? `/api/transactions?category=${encodeURIComponent(categoryFilter)}` : '/api/transactions';
  const txs = await api(url);
  const tbody = document.getElementById('txBody');

  if (!txs.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No transactions yet.</td></tr>';
    return;
  }

  tbody.innerHTML = txs.map(t => {
    const neg = t.amount < 0;
    const amtClass = neg ? 'neg' : 'pos';
    const amtStr = (neg ? '-' : '+') + '$' + Math.abs(t.amount).toFixed(2);
    return `<tr>
      <td>${t.date}</td>
      <td>${esc(t.description)}${t.note ? `<br><small style="color:#aaa">${esc(t.note)}</small>` : ''}</td>
      <td><span class="badge">${esc(t.category)}</span></td>
      <td>${t.source ? esc(t.source) : '—'}</td>
      <td class="amount ${amtClass}">${amtStr}</td>
      <td class="actions">
        <button class="btn btn-danger" onclick="deleteTx(${t.id})">Del</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  await api(`/api/transactions/${id}`, { method: 'DELETE' });
  await refreshAll();
}

// ── Add form ──────────────────────────────────────────────────────────────────
document.getElementById('addForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {
    date: fd.get('date'),
    description: fd.get('description'),
    amount: parseFloat(fd.get('amount')),
    category: fd.get('category'),
    source: fd.get('source') || null,
    note: fd.get('note') || null,
  };
  await api('/api/transactions', { method: 'POST', body: JSON.stringify(body) });
  e.target.reset();
  await refreshAll();
});

// ── Category filter ───────────────────────────────────────────────────────────
document.getElementById('catFilter').addEventListener('change', async e => {
  categoryFilter = e.target.value;
  await refreshTable();
});

// ── NAS status banner ─────────────────────────────────────────────────────────
async function refreshNasBanner() {
  try {
    const s = await api('/api/sync/status');
    const banner = document.getElementById('nasBanner');
    if (s.reachable === false) {
      banner.className = 'offline';
      banner.textContent = 'NAS share unreachable — running on local copy. Changes will not be synced.';
      banner.style.display = 'block';
    } else if (s.last_action === 'pulled_update') {
      banner.className = 'synced';
      banner.textContent = `NAS sync: pulled latest data from NAS (updated ${s.detail}).`;
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
  } catch (_) {
    // status endpoint unavailable — silently skip banner
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function refreshAll() {
  await Promise.all([refreshCharts(), refreshCategories(), refreshTable()]);
}

// Set today's date as default
document.querySelector('input[name=date]').valueAsDate = new Date();

refreshNasBanner();
refreshAll();
</script>
</body>
</html>
