<!-- Create Rule Modal -->
<div class="modal fade" id="createRuleModal" tabindex="-1" aria-labelledby="createRuleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createRuleModalLabel">Create Classification Rule</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">When this exact description is imported, it will be pre-classified with the chosen category at full confidence — no AI needed.</p>
        <div class="mb-3">
          <label for="ruleDescription" class="form-label fw-semibold">Description</label>
          <input type="text" id="ruleDescription" class="form-control" readonly />
        </div>
        <div class="mb-3">
          <label for="ruleCategory" class="form-label fw-semibold">Category</label>
          <select id="ruleCategory" class="form-select"></select>
        </div>
        <div class="mb-3">
          <label for="ruleImporter" class="form-label fw-semibold">Apply to importer</label>
          <select id="ruleImporter" class="form-select"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveRule()">Save Rule</button>
      </div>
    </div>
  </div>
</div>
