<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Accounts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/assets/css/app.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-md px-4">
  <a class="navbar-brand fw-bold" href="/">Faresight</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
          aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav me-auto mb-2 mb-md-0">
      <li class="nav-item">
        <a class="nav-link" href="/">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/accounts">Accounts</a>
      </li>
    </ul>
    <button id="syncNowBtn" class="btn btn-primary btn-sm" onclick="syncNow()">Sync now</button>
  </div>
</nav>

<div id="lockBanner" class="alert alert-danger d-none d-flex align-items-center gap-3 mb-0 rounded-0 border-0 border-bottom border-danger px-4 py-2" role="alert">
  <span id="lockMsg" class="me-auto small fw-medium"></span>
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" onclick="proceedAnyway()">Proceed anyway</button>
    <button class="btn btn-secondary btn-sm" onclick="goOffline()">Work offline</button>
  </div>
</div>
<div id="nasBanner" class="alert d-none d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium" role="alert"></div>

<main class="container-lg my-4 px-3">

  <!-- Summary widget + Add button -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Account Summary</h2>
        <div class="dropdown">
          <button class="btn btn-primary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Add Account
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><button class="dropdown-item" onclick="openAddAccount('checking')">Checking Account</button></li>
            <li><button class="dropdown-item" onclick="openAddAccount('savings')">Savings Account</button></li>
            <li><button class="dropdown-item" onclick="openAddAccount('credit_card')">Credit Card</button></li>
          </ul>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold" id="statTotal">—</div>
            <div class="text-muted small">Total Accounts</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-success" id="statActive">—</div>
            <div class="text-muted small">Active</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-primary" id="statCC">—</div>
            <div class="text-muted small">Credit Cards</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-info" id="statBank">—</div>
            <div class="text-muted small">Checking / Savings</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accounts table -->
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="text-uppercase text-muted small fw-semibold">Name</th>
            <th class="text-uppercase text-muted small fw-semibold">Nickname</th>
            <th class="text-uppercase text-muted small fw-semibold">Account #</th>
            <th class="text-uppercase text-muted small fw-semibold">Type</th>
            <th class="text-uppercase text-muted small fw-semibold">Status</th>
            <th class="text-uppercase text-muted small fw-semibold">Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="accountsBody">
          <tr><td colspan="7" class="text-center text-muted py-5">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- Add Account Modal -->
<div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addAccountModalTitle">Add Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addAccountForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctName">Account Name</label>
            <input type="text" id="acctName" name="name" class="form-control" placeholder="e.g. Chase" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNickname">Nickname</label>
            <input type="text" id="acctNickname" name="nickname" class="form-control" placeholder="e.g. My Chase Sapphire" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNumber">Account Number</label>
            <input type="text" id="acctNumber" name="account_number" class="form-control" placeholder="Last 4 digits or full number" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNotes">Notes</label>
            <textarea id="acctNotes" name="notes" class="form-control" rows="2" placeholder="Optional notes"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitAddAccount()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/scripts/common.js"></script>
<script src="/static/assets/scripts/accounts.js"></script>
</body>
</html>
