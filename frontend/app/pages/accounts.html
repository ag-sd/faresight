<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Accounts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css">
  <link rel="stylesheet" href="/static/assets/css/app.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-md px-4">
  <a class="navbar-brand fw-bold" href="/">Faresight</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
          aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav me-auto mb-2 mb-md-0">
      <li class="nav-item">
        <a class="nav-link" href="/">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/accounts">Accounts</a>
      </li>
    </ul>
    <button id="syncNowBtn" class="btn btn-primary btn-sm" onclick="syncNow()">Sync now</button>
  </div>
</nav>

<div id="lockBanner" class="alert alert-danger d-none d-flex align-items-center gap-3 mb-0 rounded-0 border-0 border-bottom border-danger px-4 py-2" role="alert">
  <span id="lockMsg" class="me-auto small fw-medium"></span>
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" onclick="proceedAnyway()">Proceed anyway</button>
    <button class="btn btn-secondary btn-sm" onclick="goOffline()">Work offline</button>
  </div>
</div>
<div id="nasBanner" class="alert d-none d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium" role="alert"></div>

<main class="container-lg my-4 px-3">

  <!-- Summary widget + Add button -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Account Summary</h2>
        <div class="dropdown">
          <button class="btn btn-primary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Add Account
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><button class="dropdown-item" onclick="openAddAccount('checking')">Checking Account</button></li>
            <li><button class="dropdown-item" onclick="openAddAccount('savings')">Savings Account</button></li>
            <li><button class="dropdown-item" onclick="openAddAccount('credit_card')">Credit Card</button></li>
          </ul>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold" id="statTotal">—</div>
            <div class="text-muted small">Total Accounts</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-success" id="statActive">—</div>
            <div class="text-muted small">Active</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-primary" id="statCC">—</div>
            <div class="text-muted small">Credit Cards</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="border rounded p-3 text-center">
            <div class="fs-3 fw-bold text-info" id="statBank">—</div>
            <div class="text-muted small">Checking / Savings</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab nav -->
  <ul class="nav nav-tabs mb-0" id="accountsTabNav" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-accounts" data-bs-toggle="tab" data-bs-target="#pane-accounts"
              type="button" role="tab" aria-controls="pane-accounts" aria-selected="true">Accounts</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-transfers" data-bs-toggle="tab" data-bs-target="#pane-transfers"
              type="button" role="tab" aria-controls="pane-transfers" aria-selected="false">Transfers</button>
    </li>
  </ul>
  <div class="tab-content">
    <div class="tab-pane fade show active pt-3" id="pane-accounts" role="tabpanel" aria-labelledby="tab-accounts">
      <div class="card shadow-sm">
        <div id="accountsTable"></div>
      </div>
    </div>
    <div class="tab-pane fade pt-3" id="pane-transfers" role="tabpanel" aria-labelledby="tab-transfers">
      <div class="card shadow-sm">
        <div class="card-header py-3">
          <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Transfers</h2>
        </div>
        <div id="transfersTable"></div>
      </div>
    </div>
  </div>

</main>

<!-- Add Account Modal -->
<div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addAccountModalTitle">Add Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addAccountForm" novalidate>
          <input type="hidden" id="acctId" />
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctName">Bank</label>
            <input type="text" id="acctName" name="bank" class="form-control" placeholder="e.g. Chase" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNickname">Name</label>
            <input type="text" id="acctNickname" name="name" class="form-control" placeholder="e.g. My Chase Sapphire" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNumber">Account Number</label>
            <input type="text" id="acctNumber" name="account_number" class="form-control" placeholder="Last 4 digits or full number" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctType">Account Type</label>
            <select id="acctType" name="account_type" class="form-select" required>
              <option value="checking">Checking</option>
              <option value="savings">Savings</option>
              <option value="credit_card">Credit Card</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="acctNotes">Notes</label>
            <textarea id="acctNotes" name="notes" class="form-control" rows="2" placeholder="Optional notes"></textarea>
          </div>
          <hr class="my-3" />
          <p class="small fw-semibold text-uppercase text-muted mb-2">Source Account</p>
          <div class="row g-2">
            <div class="col-12">
              <label class="form-label small" for="acctSourceId">Account</label>
              <select id="acctSourceId" name="source_account_id" class="form-select">
                <option value="">None</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small" for="acctSourceAmount">Amount</label>
              <input type="number" id="acctSourceAmount" name="source_amount" class="form-control" placeholder="0.00" step="0.01" min="0" />
            </div>
            <div class="col-6">
              <label class="form-label small" for="acctSourceFreq">Frequency</label>
              <select id="acctSourceFreq" name="source_frequency" class="form-select">
                <option value="">—</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitAccountForm()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Details Account Modal -->
<div class="modal fade" id="detailsAccountModal" tabindex="-1" aria-labelledby="detailsAccountModalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailsAccountModalTitle">Account Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="detailsAccountForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-medium" for="detailName">Bank</label>
            <input type="text" id="detailName" name="bank" class="form-control" disabled />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="detailNickname">Name</label>
            <input type="text" id="detailNickname" name="name" class="form-control" disabled />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="detailNumber">Account Number</label>
            <input type="text" id="detailNumber" name="account_number" class="form-control" disabled />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="detailType">Account Type</label>
            <select id="detailType" name="account_type" class="form-select" disabled>
              <option value="checking">Checking</option>
              <option value="savings">Savings</option>
              <option value="credit_card">Credit Card</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium" for="detailNotes">Notes</label>
            <textarea id="detailNotes" name="notes" class="form-control" rows="2" disabled></textarea>
          </div>
          <hr class="my-3" />
          <p class="small fw-semibold text-uppercase text-muted mb-2">Source Account</p>
          <div class="row g-2">
            <div class="col-12">
              <label class="form-label small" for="detailSourceId">Account</label>
              <select id="detailSourceId" name="source_account_id" class="form-select" disabled>
                <option value="">None</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small" for="detailSourceAmount">Amount</label>
              <input type="number" id="detailSourceAmount" name="source_amount" class="form-control" step="0.01" min="0" disabled />
            </div>
            <div class="col-6">
              <label class="form-label small" for="detailSourceFreq">Frequency</label>
              <select id="detailSourceFreq" name="source_frequency" class="form-select" disabled>
                <option value="">—</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <div id="detailsFooter" class="d-flex gap-2 justify-content-end w-100">
          <button type="button" class="btn btn-danger btn-sm" id="detailsDeactivateBtn" onclick="deactivateFromDetails()">Deactivate</button>
          <button type="button" class="btn btn-primary" onclick="enterEditMode()">Edit</button>
        </div>
        <div id="detailsEditFooter" class="d-flex gap-2 w-100 justify-content-end d-none">
          <button type="button" class="btn btn-secondary" onclick="exitEditMode()">Discard</button>
          <button type="button" class="btn btn-primary" onclick="saveDetailsForm()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script src="/static/assets/scripts/common.js"></script>
<script src="/static/assets/scripts/accounts.js"></script>
</body>
</html>
