<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css">
  <link rel="stylesheet" href="/static/assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-md px-4">
  <a class="navbar-brand fw-bold" href="/">Faresight</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
          aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav me-auto mb-2 mb-md-0">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/accounts">Accounts</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/upload">Upload</a>
      </li>
    </ul>
    <button id="syncNowBtn" class="btn btn-primary btn-sm" onclick="syncNow()">Sync now</button>
  </div>
</nav>

<div id="lockBanner" class="alert alert-danger d-none d-flex align-items-center gap-3 mb-0 rounded-0 border-0 border-bottom border-danger px-4 py-2" role="alert">
  <span id="lockMsg" class="me-auto small fw-medium"></span>
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" onclick="proceedAnyway()">Proceed anyway</button>
    <button class="btn btn-secondary btn-sm" onclick="goOffline()">Work offline</button>
  </div>
</div>
<div id="nasBanner" class="alert d-none d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium" role="alert"></div>

<main class="container-lg my-4 px-3">

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Spending by Category</h2>
            <div class="d-flex gap-2 align-items-center">
              <select id="catYear" class="form-select form-select-sm" style="width:auto" onchange="onCatPickerChange()"></select>
              <select id="catMonth" class="form-select form-select-sm" style="width:auto" onchange="onCatPickerChange()">
                <option value="">Full year</option>
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="catChart"></canvas></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Monthly Spending</h2>
            <select id="monthYear" class="form-select form-select-sm" style="width:auto" onchange="onMonthYearChange()"></select>
          </div>
          <div class="chart-wrap"><canvas id="monthChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction table -->
  <div class="card shadow-sm">
    <div class="card-header d-flex align-items-center justify-content-between py-3">
      <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Transactions</h2>
      <button class="btn btn-outline-secondary btn-sm" onclick="txTable.download('csv', 'transactions.csv')">Export CSV</button>
    </div>
    <div id="txTable"></div>
  </div>

</main>

<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-labelledby="editCategoryModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editCategoryModalLabel">Edit Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <dl class="row mb-3">
          <dt class="col-sm-4">Date</dt>
          <dd class="col-sm-8" id="editTxDate"></dd>
          <dt class="col-sm-4">Description</dt>
          <dd class="col-sm-8" id="editTxDescription"></dd>
          <dt class="col-sm-4">Amount</dt>
          <dd class="col-sm-8" id="editTxAmount"></dd>
        </dl>
        <label for="editCategorySelect" class="form-label fw-semibold">Category</label>
        <select id="editCategorySelect" class="form-select"></select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveCategory()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script src="/static/assets/scripts/common.js"></script>
<script src="/static/assets/scripts/app.js"></script>
</body>
</html>
