<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faresight — Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/assets/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
  <div class="d-flex align-items-center gap-3">
    <span class="navbar-brand fw-bold mb-0 h1">Faresight</span>
    <span class="text-white-50 small">local expense tracker</span>
  </div>
  <button id="syncNowBtn" class="btn btn-primary btn-sm" onclick="syncNow()">Sync now</button>
</nav>

<div id="lockBanner" class="alert alert-danger d-none d-flex align-items-center gap-3 mb-0 rounded-0 border-0 border-bottom border-danger px-4 py-2" role="alert">
  <span id="lockMsg" class="me-auto small fw-medium"></span>
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" onclick="proceedAnyway()">Proceed anyway</button>
    <button class="btn btn-secondary btn-sm" onclick="goOffline()">Work offline</button>
  </div>
</div>

<div id="nasBanner" class="alert d-none d-flex align-items-center mb-0 rounded-0 border-0 border-bottom px-4 py-2 small fw-medium" role="alert"></div>

<main class="container-lg my-4 px-3">

  <!-- Add / Import Transactions -->
  <div class="card shadow-sm mb-4">
    <div class="card-header p-0 border-bottom-0">
      <ul class="nav nav-tabs card-header-tabs px-3 pt-2" id="entryTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="import-tab" data-bs-toggle="tab" data-bs-target="#importPane"
                  type="button" role="tab" aria-controls="importPane" aria-selected="true">
            Import CSV
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manualPane"
                  type="button" role="tab" aria-controls="manualPane" aria-selected="false">
            Add manually
          </button>
        </li>
      </ul>
    </div>
    <div class="tab-content">

      <!-- Tab 1: Import CSV -->
      <div class="tab-pane fade show active p-3" id="importPane" role="tabpanel" aria-labelledby="import-tab">
        <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Import from CSV</h2>
        <form id="importForm">
          <div class="row g-2 align-items-end">
            <div class="col-sm-4 col-md-3">
              <label class="form-label small fw-medium" for="bankSelect">Bank</label>
              <select id="bankSelect" name="bank" class="form-select" required>
                <option value="">Select bank…</option>
              </select>
            </div>
            <div class="col-sm-6 col-md-5">
              <label class="form-label small fw-medium" for="csvFile">CSV file</label>
              <input type="file" id="csvFile" name="file" class="form-control" accept=".csv" required />
            </div>
            <div class="col-sm-2">
              <button type="submit" class="btn btn-primary w-100">Import</button>
            </div>
          </div>
        </form>
        <div id="importResult" class="mt-3 d-none"></div>
        <p class="text-muted small mt-3 mb-0">
          Expected columns: <code>date</code> (YYYY-MM-DD), <code>description</code>, <code>amount</code>
          (negative = expense). Optional: <code>category</code>, <code>note</code>.
        </p>
      </div>

      <!-- Tab 2: Add manually -->
      <div class="tab-pane fade p-3" id="manualPane" role="tabpanel" aria-labelledby="manual-tab">
        <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Add Transaction</h2>
        <form id="addForm">
          <div class="row g-2">
            <div class="col-sm-6 col-md-4 col-lg-2">
              <input type="date" name="date" class="form-control" required />
            </div>
            <div class="col-sm-6 col-md-4 col-lg-3">
              <input type="text" name="description" class="form-control" placeholder="Description" required />
            </div>
            <div class="col-sm-6 col-md-4 col-lg-2">
              <input type="number" name="amount" class="form-control" placeholder="Amount (negative = expense)" step="0.01" required />
            </div>
            <div class="col-sm-6 col-md-4 col-lg-2">
              <input type="text" name="category" class="form-control" placeholder="Category" required list="catList" />
              <datalist id="catList"></datalist>
            </div>
            <div class="col-sm-6 col-md-4 col-lg-2">
              <input type="text" name="source" class="form-control" placeholder="Source (e.g. credit card)" />
            </div>
            <div class="col-12">
              <textarea name="note" class="form-control" placeholder="Note (optional)" rows="2"></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">Add</button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Spending by Category</h2>
          <div class="chart-wrap"><canvas id="catChart"></canvas></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Monthly Spending</h2>
          <div class="chart-wrap"><canvas id="monthChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction table -->
  <div class="card shadow-sm">
    <div class="card-header d-flex align-items-center justify-content-between py-3">
      <h2 class="h6 text-uppercase text-muted fw-semibold mb-0">Transactions</h2>
      <select id="catFilter" class="form-select form-select-sm w-auto">
        <option value="">All categories</option>
      </select>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="text-uppercase text-muted small fw-semibold">Date</th>
            <th class="text-uppercase text-muted small fw-semibold">Description</th>
            <th class="text-uppercase text-muted small fw-semibold">Category</th>
            <th class="text-uppercase text-muted small fw-semibold">Source</th>
            <th class="text-uppercase text-muted small fw-semibold amount text-end">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="txBody">
          <tr><td colspan="6" class="text-center text-muted py-5">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/scripts/app.js"></script>
</body>
</html>
